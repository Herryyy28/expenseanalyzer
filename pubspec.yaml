name: expenseanalyzer
description: Smart Expense Analyzer with AI
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 Firebase Core
  firebase_core: ^3.1.1

  # 🔐 Authentication
  firebase_auth: ^5.1.1
  google_sign_in: ^6.2.1

  # 📦 Database (Cloud CRUD)
  cloud_firestore: ^5.0.2

  # 🧠 State Management
  provider: ^6.1.2

  # 📊 Charts & Analytics
  fl_chart: ^0.69.0

  # 🎨 UI / Animations
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1

  # 💾 Local Storage
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3

  # 📁 CSV / PDF Export
  csv: ^6.0.0
  pdf: ^3.10.1
  printing: ^5.11.1

  # 🌐 Helpers
  intl: ^0.19.0

  # 🔐 Senior Security & Privacy
  local_auth: ^2.2.0
  flutter_windowmanager: ^0.2.0

  # 🤖 Advanced AI & OCR
  google_generative_ai: ^0.4.5
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
