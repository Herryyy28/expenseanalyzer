name: expenseanalyzer
description: Smart Expense Analyzer with AI
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 Firebase Core
  firebase_core: ^4.4.0

  # 🔐 Authentication
  firebase_auth: ^6.1.4
  google_sign_in: ^7.2.0

  # 📦 Database (Cloud CRUD)
  cloud_firestore: ^6.1.2

  # 🧠 State Management
  provider: ^6.1.2

  # 📊 Charts & Analytics
  fl_chart: ^1.1.1

  # 🎨 UI / Animations
  lottie: ^3.1.2
  flutter_svg: ^2.0.10
  google_fonts: ^8.0.1

  # 💾 Local Storage
  shared_preferences: ^2.3.2
  sqflite: ^2.4.0
  path_provider: ^2.1.4

  # 📁 CSV Export
  csv: ^6.0.0

  # 🌐 Internet utilities
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/success.json
    - assets/animations/loading.json



  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
